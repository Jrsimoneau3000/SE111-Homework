<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>
</head>
<body>

  <h1>Calculator</h1>

  <p>Choose an operation:</p>
  <button onclick="selectOp('+')">Add</button>
  <button onclick="selectOp('-')">Subtract</button>
  <button onclick="selectOp('*')">Multiply</button>
  <button onclick="selectOp('/')">Divide</button>

  <p id="selectedOp">No operation selected</p>

  <br>

  <label>Number 1: <input type="number" id="num1"></label>
  <br><br>
  <label>Number 2: <input type="number" id="num2"></label>

  <br><br>

  <button onclick="calculate()">Calculate</button>

  <h2 id="result"></h2>

  <script>
    var op = "";

    function selectOp(o) {
      op = o;
      document.getElementById("selectedOp").innerHTML = "Selected: " + op;
    }

    function add(a, b) {
      return a + b;
    }

    function subtract(a, b) {
      return a - b;
    }

    function multiply(a, b) {
      return a * b;
    }

    function divide(a, b) {
      return a / b;
    }

    function calculate() {
      var a = parseFloat(document.getElementById("num1").value);
      var b = parseFloat(document.getElementById("num2").value);

      if (op == "") {
        alert("Please select an operation first!");
        return;
      }

      var result;

      if (op == "+") {
        result = add(a, b);
      } else if (op == "-") {
        result = subtract(a, b);
      } else if (op == "*") {
        result = multiply(a, b);
      } else if (op == "/") {
        if (b == 0) {
          alert("Can't divide by zero!");
          return;
        }
        result = divide(a, b);
      }

      alert("The answer is: " + result);
      document.getElementById("result").innerHTML = "Result: " + result;
    }
  </script>

</body>
</html>
